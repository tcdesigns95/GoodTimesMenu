<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF7F2">
<title>Good Times Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --coral:    #E8673A;
  --charcoal: #1E1C1A;
  --cream:    #FAF7F2;
  --linen:    #F0EBE3;
  --muted:    #8A8580;
  --border:   rgba(30,28,26,0.10);
  --dash:     rgba(30,28,26,0.18);
  --vi-bg:#EDE9F7; --vi-tx:#4A2E96;
  --go-bg:#FFF3D0; --go-tx:#7A5010;
  --sa-bg:#E4F2E4; --sa-tx:#2E6B2E;
  --cb-bg:#D4ECD4; --cb-tx:#1A6B2E;
  --cg-bg:#FBE7C6; --cg-tx:#8A5A12;
}

html, body {
  height: 100%; overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream); color: var(--charcoal);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* ══ HEADER ══ */
#gt-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  background: var(--cream);
  border-bottom: 2px solid var(--charcoal);
  transition: background .3s, box-shadow .3s;
}
#gt-header.scrolled {
  background: rgba(250,247,242,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 16px 28px;
  display: flex; justify-content: space-between; align-items: center; gap: 16px;
  transition: padding .3s;
}
#gt-header.scrolled .header-inner { padding: 10px 28px; }
.header-left { display: flex; flex-direction: column; gap: 1px; }

.gt-logo {
  font-family: 'Righteous', cursive;
  font-size: 34px; line-height: 1;
  display: inline-flex; align-items: baseline; gap: 5px;
  user-select: none; transition: font-size .3s;
}
#gt-header.scrolled .gt-logo { font-size: 24px; }
.gt-logo .g, .gt-logo .t {
  cursor: pointer; padding: 4px 3px 2px;
  border-bottom: 3px solid transparent; transition: opacity .15s;
}
.gt-logo .g { color: var(--coral); }
.gt-logo .g.active { border-bottom-color: var(--coral); }
.gt-logo .t { color: var(--charcoal); }
.gt-logo .t.active { border-bottom-color: var(--charcoal); }
.gt-logo .g:active, .gt-logo .t:active { opacity: .6; }

.brand-sub {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .2em; color: var(--muted); font-weight: 700; margin-top: 2px;
  max-height: 20px; overflow: hidden;
  transition: opacity .25s, max-height .25s, margin .25s;
}
#gt-header.scrolled .brand-sub { opacity: 0; max-height: 0; margin: 0; }

.header-right { display: flex; align-items: center; gap: 14px; }

.menu-badge {
  background: var(--charcoal); color: var(--cream);
  padding: 9px 18px; border-radius: 50px;
  font-family: 'Righteous', cursive; font-size: 15px; white-space: nowrap;
  transition: font-size .3s, padding .3s;
}
#gt-header.scrolled .menu-badge { font-size: 13px; padding: 6px 14px; }

.page-dots { display: flex; align-items: center; gap: 7px; }
.page-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dash); cursor: pointer; border: none; padding: 0;
  transition: background .2s, transform .2s;
}
.page-dot.active { background: var(--coral); transform: scale(1.3); }

/* ══ EDIT BAR ══ */
#edit-bar {
  position: fixed;
  left: 0; right: 0; z-index: 45;
  background: var(--linen);
  border-bottom: 1px solid var(--dash);
  padding: 8px 28px;
  display: none; align-items: center; gap: 8px; flex-wrap: wrap;
}
#edit-bar.visible { display: flex; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 10px;
  font-size: 14px; font-weight: 500; cursor: pointer; border: none;
  font-family: 'DM Sans', sans-serif; min-height: 40px; white-space: nowrap;
}
.btn-coral { background: var(--coral); color: white; }
.btn-dark  { background: var(--charcoal); color: var(--cream); }
.btn-ghost { background: transparent; border: 1.5px solid var(--dash); color: var(--charcoal); }
.btn:active { opacity: .8; transform: scale(.98); }
.edit-status { font-size: 12px; color: var(--muted); margin-left: auto; }

/* ══ SWIPE PAGES ══ */
#gt-pages-wrap {
  position: fixed;
  left: 0; right: 0; bottom: 52px;
  overflow: hidden;
}
#gt-pages {
  display: flex; height: 100%;
  transition: transform .38s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}
.gt-page {
  flex: 0 0 100%; width: 100%; height: 100%;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.page-inner {
  max-width: 860px; margin: 0 auto;
  padding: 32px 32px 48px;
}

/* ══ SECTION HEADING ══ */
.sec-heading {
  font-family: 'Righteous', cursive; font-size: 26px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.sec-heading::after { content: ''; flex: 1; height: 2px; background: var(--charcoal); }
.sec-count {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--muted); letter-spacing: .05em; text-transform: uppercase;
}

/* ══ TOP PICKS HERO ══ */
.hero-intro { margin-bottom: 24px; }
.hero-intro h2 {
  font-family: 'Righteous', cursive; font-size: 30px; line-height: 1.2; margin-bottom: 6px;
}
.hero-intro h2 span { color: var(--coral); }
.hero-intro p { font-size: 14px; color: var(--muted); line-height: 1.6; }

.swipe-hint {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
  background: var(--linen); border-radius: 10px;
  padding: 9px 14px; margin-bottom: 28px;
}
.swipe-arrow { animation: nudge 2s ease-in-out infinite; display: inline-block; }
@keyframes nudge { 0%,100%{transform:translateX(0)} 50%{transform:translateX(5px)} }

.top-pick-item { padding: 20px 0; border-bottom: 1px dashed var(--dash); }
.top-pick-item:first-of-type { border-top: 1px dashed var(--dash); }
.tp-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--coral); margin-bottom: 7px; }
.tp-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
.tp-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tp-name { font-size: 20px; font-weight: 700; }
.tp-price { font-family: 'Righteous', cursive; font-size: 16px; white-space: nowrap; }
.tp-meta { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
.tp-desc { font-size: 14px; color: #5A5754; line-height: 1.65; }

/* ══ MENU ITEMS ══ */
.menu-item { padding: 22px 0; border-bottom: 1px dashed var(--dash); }
.menu-item:last-child { border-bottom: none; }
.item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.item-left { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.item-name  { font-size: 17px; font-weight: 700; }
.item-price { font-family: 'Righteous', cursive; font-size: 15px; white-space: nowrap; }
.item-meta  { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.item-desc  { font-size: 14px; color: #5A5754; line-height: 1.6; }
.thc     { color: var(--coral); font-weight: 700; }
.cbd-val { color: var(--cb-tx); font-weight: 700; }
.cbg-val { color: var(--cg-tx); font-weight: 700; }

.badge { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; letter-spacing: .03em; }
.indica        { background: var(--vi-bg); color: var(--vi-tx); }
.sativa        { background: var(--go-bg); color: var(--go-tx); }
.hybrid        { background: var(--sa-bg); color: var(--sa-tx); }
.indica-hybrid { background: var(--vi-bg); color: var(--vi-tx); }
.sativa-hybrid { background: var(--sa-bg); color: var(--sa-tx); }
.cbd-badge     { background: var(--cb-bg); color: var(--cb-tx); }
.cbg-badge     { background: var(--cg-bg); color: var(--cg-tx); }

.edit-actions { display: flex; gap: 4px; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 5px 7px; border-radius: 8px; color: var(--muted); font-size: 18px;
  display: inline-flex; align-items: center; min-width: 36px; min-height: 36px; justify-content: center;
}
.icon-btn:active { background: var(--linen); }
.icon-btn.red:active { color: #C0392B; }
.sec-name-input {
  font-family: 'Righteous', cursive; font-size: 22px;
  background: none; border: none; border-bottom: 2px dashed var(--dash);
  color: var(--charcoal); outline: none; min-height: 44px; flex: 1;
}
.inline-add-btn {
  background: none; border: 1.5px dashed var(--dash);
  width: 100%; padding: 12px; border-radius: 10px;
  font-size: 14px; color: var(--muted); cursor: pointer;
  font-family: 'DM Sans', sans-serif; margin-top: 12px;
  display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 44px;
}
.inline-add-btn:active { border-color: var(--coral); color: var(--coral); }

/* ══ PAGE ARROWS ══ */
.page-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 30;
  background: rgba(250,247,242,0.25);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 50%; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  color: rgba(30,28,26,0.4);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: background .2s, color .2s, opacity .2s;
}
.page-arrow:hover {
  background: rgba(250,247,242,0.6);
  color: rgba(30,28,26,0.85);
}
.page-arrow:active {
  background: rgba(250,247,242,0.75);
  color: var(--charcoal);
}
.page-arrow.prev { left: 12px; }
.page-arrow.next { right: 12px; }
.page-arrow.hidden { opacity: 0; pointer-events: none; }

/* ══ FOOTER ══ */
.page-footer {
  margin-top: 32px; padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.page-footer em { font-style: italic; }

/* ══ STATE ══ */
.state-msg { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 16px; line-height: 1.8; }
.spinner {
  width: 32px; height: 32px; margin: 0 auto 16px;
  border: 3px solid var(--border); border-top-color: var(--coral);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ CONNECT BANNER ══ */
.connect-banner {
  background: white; border: 1.5px dashed var(--dash);
  border-radius: 14px; padding: 32px 28px; text-align: center;
}
.connect-banner h3 { font-family: 'Righteous', cursive; font-size: 22px; margin-bottom: 10px; }
.connect-banner p { font-size: 15px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; max-width: 480px; margin-left: auto; margin-right: auto; }
.url-row { display: flex; gap: 10px; max-width: 560px; margin: 0 auto; }
.url-row input {
  flex: 1; padding: 12px 14px; border: 1.5px solid var(--dash); border-radius: 10px;
  font-size: 16px; font-family: 'DM Sans', sans-serif;
  background: var(--cream); color: var(--charcoal); outline: none; min-height: 44px;
}
.url-row input:focus { border-color: var(--coral); }
.steps { text-align: left; max-width: 480px; margin: 20px auto 0; display: grid; gap: 12px; }
.step { display: flex; gap: 12px; align-items: flex-start; font-size: 14px; line-height: 1.5; }
.step-num {
  background: var(--coral); color: white; border-radius: 50%;
  width: 24px; height: 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-top: 1px;
}
.step code { background: var(--linen); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

/* ══ MODAL ══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; z-index: 200;
}
.modal {
  background: white; border-radius: 16px; padding: 28px;
  width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal h3 { font-family: 'Righteous', cursive; font-size: 20px; margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 11px 13px; border: 1.5px solid var(--dash); border-radius: 10px;
  font-size: 16px; font-family: 'DM Sans', sans-serif;
  background: var(--cream); color: var(--charcoal); outline: none;
  min-height: 44px; -webkit-appearance: none; appearance: none;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--coral); }
.field textarea { resize: vertical; min-height: 80px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ══ TICKER ══ */
#gt-ticker {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: 52px; background: var(--coral);
  border-top: 3px solid rgba(0,0,0,0.12);
  box-shadow: 0 -4px 24px rgba(232,103,58,0.28);
  display: flex; align-items: center; overflow: hidden;
}
#gt-ticker::before, #gt-ticker::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 60px; z-index: 2; pointer-events: none;
}
#gt-ticker::before { left: 0; background: linear-gradient(to right, var(--coral), transparent); }
#gt-ticker::after  { right: 0; background: linear-gradient(to left,  var(--coral), transparent); }
.ticker-label {
  flex-shrink: 0; z-index: 3; background: rgba(0,0,0,0.18); color: white;
  font-family: 'Righteous', cursive; font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
  padding: 0 16px; height: 100%; display: flex; align-items: center; white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,0.18);
}
.ticker-scroll-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; }
.ticker-track {
  display: flex; align-items: center; white-space: nowrap;
  animation: ticker 55s linear infinite; will-change: transform;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-item { color: white; font-size: 15px; font-weight: 600; padding: 0 40px; }
.ticker-sep  { width: 5px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 50%; display: inline-block; flex-shrink: 0; }

.ticker-edit-btn {
  position: fixed; bottom: 60px; right: 16px; z-index: 150;
  background: var(--charcoal); color: white; border: none; border-radius: 50px;
  padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  display: flex; align-items: center; gap: 6px;
}
.ticker-edit-btn:active { transform: scale(.97); }

/* Banner editor */
.banner-modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
.banner-modal h3 { font-family: 'Righteous', cursive; font-size: 20px; margin-bottom: 6px; }
.banner-modal .sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
.banner-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: var(--cream); border-radius: 10px; padding: 10px 12px; border: 1.5px solid var(--border); }
.banner-row input[type="text"] { flex: 1; border: none; background: none; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--charcoal); outline: none; padding: 0; min-height: 32px; }
.banner-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--coral); cursor: pointer; flex-shrink: 0; }
.banner-row .b-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
.banner-row .b-del:active { color: #C0392B; }
.add-msg-btn { width: 100%; padding: 11px; border: 1.5px dashed var(--dash); border-radius: 10px; background: none; font-size: 14px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; min-height: 44px; }
.add-msg-btn:active { border-color: var(--coral); color: var(--coral); }
.banner-hint { font-size: 12px; color: var(--muted); margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); line-height: 1.6; }

/* ══ RESPONSIVE ══ */
@media (max-width: 600px) {
  .header-inner { padding: 12px 16px; }
  .gt-logo { font-size: 26px; }
  .menu-badge { display: none; }
  .page-inner { padding: 24px 16px 36px; }
  .page-arrow { display: none; }
  #edit-bar { padding: 8px 16px; }
}
@media print {
  #gt-header { position: static; }
  #edit-bar, .ticker-edit-btn, #gt-ticker, .page-arrow { display: none !important; }
}
</style>
</head>
<body>

<div id="gt-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="gt-logo">
        <span class="g" id="logo-g">Good</span>&nbsp;<span class="t" id="logo-t">Times</span>
      </div>
      <div class="brand-sub">Cannabis Company</div>
    </div>
    <div class="header-right">
      <div class="page-dots" id="page-dots"></div>
      <div class="menu-badge">Fresh In-Store Menu</div>
    </div>
  </div>
</div>

<div id="edit-bar">
  <button class="btn btn-coral" id="b-add-item">+ Add item</button>
  <button class="btn btn-dark"  id="b-add-sec">+ Section</button>
  <button class="btn btn-ghost" id="b-sheet">⬡ Connect sheet</button>
  <button class="btn btn-ghost" id="b-reload" style="display:none">↻ Reload</button>
  <span class="edit-status" id="edit-status">○ No sheet</span>
</div>

<div id="gt-pages-wrap">
  <div id="gt-pages"></div>
</div>

<button class="page-arrow prev hidden" id="arrow-prev">&#8592;</button>
<button class="page-arrow next hidden" id="arrow-next">&#8594;</button>

<div id="gt-ticker">
  <div class="ticker-label">🐘 Good Times</div>
  <div class="ticker-scroll-wrap">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
</div>

<script>
// ══ STATE ══
let mode      = 'view';
let modal     = null;
let sheetUrl  = localStorage.getItem('gt_sheet_url') || '';
let sections  = JSON.parse(localStorage.getItem('gt_sections') || 'null') || [];
let loading   = false;
let loadError = '';
let activeSec = null;
let nextId    = Date.now();
let curPage   = 0;
let tickerSpeed = parseInt(localStorage.getItem('gt_ticker_speed') || '45');
let banners = JSON.parse(localStorage.getItem('gt_banners') || 'null') || [
  { text: '🔥 House Prerolls — 2 for $10 · Ask your budtender!', on: true },
  { text: '🌿 Earn loyalty points on every purchase', on: true },
  { text: '⚡ New drops every week — ask staff what just landed', on: true },
  { text: '🐘 Good Times Cannabis · Sellwood & Union · Portland\'s finest', on: true },
];

// ══ PERSIST ══
function save() {
  localStorage.setItem('gt_sections', JSON.stringify(sections));
  if (sheetUrl) localStorage.setItem('gt_sheet_url', sheetUrl);
}
function saveBanners() { localStorage.setItem('gt_banners', JSON.stringify(banners)); }
function saveSpeed(s) { tickerSpeed = s; localStorage.setItem('gt_ticker_speed', s); }

// ══ SORT — Top Pick always first ══
function sortSections() {
  sections.sort((a, b) => {
    const n = s => s.name.toLowerCase();
    const isFirst = s => n(s).includes('top pick') || n(s).includes('staff pick') || n(s).includes('featured');
    if (isFirst(a) && !isFirst(b)) return -1;
    if (!isFirst(a) && isFirst(b)) return 1;
    return 0;
  });
}

// ══ LAYOUT — measure header and set page top ══
function updateLayout() {
  const header = document.getElementById('gt-header');
  const editBar = document.getElementById('edit-bar');
  const pagesWrap = document.getElementById('gt-pages-wrap');
  if (!header || !pagesWrap) return;

  const hh = header.getBoundingClientRect().height;
  const eh = (mode === 'edit') ? editBar.getBoundingClientRect().height : 0;
  const topOffset = hh + eh;

  pagesWrap.style.top = topOffset + 'px';
  editBar.style.top = hh + 'px';

  // Set page-inner padding so content starts with breathing room below the bars
  document.querySelectorAll('.page-inner').forEach(el => {
    el.style.paddingTop = '32px';
  });
}

// ══ CSV FETCH ══
function buildCsvUrl(url) {
  const u = url.trim();
  if (u.includes('output=csv')) return u;
  const id  = u.match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1];
  const gid = u.match(/[?&]gid=(\d+)/)?.[1] || '0';
  if (id) return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
  return u;
}

async function fetchSheet(url) {
  loading = true; loadError = ''; render();
  const csv = buildCsvUrl(url);
  const proxies = [
    csv,
    `https://corsproxy.io/?${encodeURIComponent(csv)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(csv)}`
  ];
  let lastErr = '';
  for (const src of proxies) {
    try {
      const res = await fetch(src);
      if (!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
      const text = await res.text();
      if (!text || text.trim().length < 5) { lastErr = 'Empty response'; continue; }
      parseCSV(text);
      sheetUrl = url.trim(); save();
      loadError = ''; loading = false; render(); return;
    } catch(e) { lastErr = e.message || 'Fetch failed'; }
  }
  loadError = `Failed — ${lastErr}. Make sure sheet is published: File → Share → Publish to web → CSV.`;
  loading = false; render();
}

function parseCSV(text) {
  const rows = text.trim().split('\n').map(parseRow);
  if (rows.length < 2) return;
  const map = {}, order = [];
  for (let i = 1; i < rows.length; i++) {
    const [sec, name, type, thc, cbd, cbg, grower, price, size, desc] = rows[i];
    if (!sec?.trim() || !name?.trim()) continue;
    const key = sec.trim();
    if (!map[key]) { map[key] = { id: nextId++, name: key, items: [] }; order.push(key); }
    const typeNorm = (type||'hybrid').trim().toLowerCase().replace(/[\s\-]+/g,'-').replace(/^-|-$/g,'');
    map[key].items.push({
      id: nextId++, name: name.trim(), type: typeNorm,
      thc: (thc||'').trim(), cbd: (cbd||'').trim(), cbg: (cbg||'').trim(), grower: (grower||'').trim(),
      price: (price||'').trim(), size: (size||'').trim(), desc: (desc||'').trim()
    });
  }
  sections = order.map(k => map[k]);
  sortSections();
}

function parseRow(row) {
  const out = []; let cur = '', q = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (c === '"') { if (q && row[i+1]==='"') { cur+='"'; i++; } else q=!q; }
    else if (c===',' && !q) { out.push(cur); cur=''; }
    else cur += c;
  }
  out.push(cur); return out;
}

// ══ UTILS ══
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function q(id) { return document.getElementById(id); }
function val(id) { return (q(id)?.value||'').trim(); }
function setMode(m) { mode = m; render(); }

function typeBadge(type) {
  const labels = { 'indica':'Indica','sativa':'Sativa','hybrid':'Hybrid','indica-hybrid':'Indica Hybrid','sativa-hybrid':'Sativa Hybrid' };
  const known  = Object.keys(labels);
  const cls    = known.includes(type) ? type : 'hybrid';
  return `<span class="badge ${cls}">${esc(labels[cls]||type)}</span>`;
}
function itemMeta(item) {
  return [
    `THC: <span class="thc">${esc(item.thc)}%</span>`,
    item.cbd    ? `CBD: <span class="cbd-val">${esc(item.cbd)}%</span>` : '',
    item.cbg    ? `CBG: <span class="cbg-val">${esc(item.cbg)}%</span>` : '',
    item.grower ? esc(item.grower) : '',
    item.size   ? esc(item.size)   : ''
  ].filter(Boolean).join(' · ');
}

// ══ PAGE NAV ══
function totalPages() { return Math.max(1, sections.length); }

function goToPage(n, animate=true) {
  curPage = Math.max(0, Math.min(n, totalPages()-1));
  const wrap = q('gt-pages');
  if (!wrap) return;
  if (!animate) wrap.style.transition = 'none';
  wrap.style.transform = `translateX(-${curPage*100}%)`;
  if (!animate) requestAnimationFrame(() => wrap.style.transition = '');
  updateNav();
  // Reset scroll on current page
  document.querySelectorAll('.gt-page')[curPage]?.scrollTo(0, 0);
}

function updateNav() {
  const total = totalPages();
  const dotsEl = q('page-dots');
  if (dotsEl) {
    dotsEl.innerHTML = sections.map((s,i) =>
      `<button class="page-dot${i===curPage?' active':''}" data-page="${i}" title="${esc(s.name)}"></button>`
    ).join('');
    dotsEl.querySelectorAll('.page-dot').forEach(btn =>
      btn.addEventListener('click', () => goToPage(+btn.dataset.page))
    );
  }
  const prev = q('arrow-prev'), next = q('arrow-next');
  prev?.classList.toggle('hidden', curPage===0);
  next?.classList.toggle('hidden', curPage>=total-1);
}

    } else {
      head = `<div class="sec-heading">${esc(sec.name)}<span class="sec-count">${sec.items.length} strains</span></div>`;
    }

      const cbgBadge = item.cbg ? `<span class="badge cbg-badge">CBG</span>` : '';
      const editBtns = isEdit ? `<div class="edit-actions">
        <button class="icon-btn" data-action="edit" data-sec="${sec.id}" data-item="${item.id}">✎</button>
        <button class="icon-btn red" data-action="del" data-sec="${sec.id}" data-item="${item.id}">✕</button>

}

// ══ TICKER ══
function renderTicker() {
  const track = q('ticker-track');
  if (!track) return;
  const active = banners.filter(b => b.on && b.text.trim());
  const msgs = active.length ? active : [{ text: 'Good Times Cannabis · Portland, OR' }];
  track.innerHTML = [...msgs, ...msgs].map(b =>
    `<span class="ticker-item">${b.text}</span><span class="ticker-sep"></span>`
  ).join('');
  track.style.animationDuration = tickerSpeed + 's';
}

function speedLabel(s) {
  if (s <= 25) return 'Very fast';
  if (s <= 35) return 'Fast';
  if (s <= 50) return 'Medium';
  if (s <= 65) return 'Slow';
  return 'Very slow';
}

function openBannerEditor() {
  q('banner-overlay')?.remove();
  const rows = banners.map((b,i) => `<div class="banner-row">
    <input type="checkbox" ${b.on?'checked':''} data-i="${i}" class="bc">
    <input type="text" value="${esc(b.text)}" data-i="${i}" class="bt" placeholder="Type a promo message…">
    <button class="b-del" data-i="${i}">✕</button>
  </div>`).join('');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'banner-overlay';
  overlay.innerHTML = `<div class="banner-modal">
    <h3>🔥 Ticker Messages</h3>
    <p class="sub">Check to show, uncheck to hide. Changes save instantly.</p>
    <div>${rows}</div>
    <button class="add-msg-btn" id="b-add">+ Add message</button>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);">Scroll Speed</label>
        <span style="font-size:13px;font-weight:600;color:var(--charcoal);" id="speed-label">${speedLabel(tickerSpeed)}</span>
      </div>
      <input type="range" id="speed-slider" min="20" max="90" step="5" value="${tickerSpeed}"
        style="width:100%;accent-color:var(--coral);height:6px;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;">
        <span>Fast</span><span>Slow</span>
      </div>
    </div>
    <p class="banner-hint">💡 Use emoji at the start — e.g. 🔥 Daily deal: 2 prerolls for $10!</p>
    <div class="modal-actions"><button class="btn btn-ghost" id="b-done">Done</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.bc').forEach(el => el.addEventListener('change', () => { banners[+el.dataset.i].on=el.checked; saveBanners(); renderTicker(); }));
  overlay.querySelectorAll('.bt').forEach(el => el.addEventListener('input',  () => { banners[+el.dataset.i].text=el.value; saveBanners(); renderTicker(); }));
  overlay.querySelectorAll('.b-del').forEach(el => el.addEventListener('click', () => { banners.splice(+el.dataset.i,1); saveBanners(); renderTicker(); openBannerEditor(); }));
  q('b-add').addEventListener('click',  () => { banners.push({text:'',on:true}); saveBanners(); openBannerEditor(); });
  q('b-done').addEventListener('click', () => overlay.remove());
  const slider = q('speed-slider');
  const label  = q('speed-label');
  if (slider) {
    slider.addEventListener('input', () => {
      const s = parseInt(slider.value);
      if (label) label.textContent = speedLabel(s);
      saveSpeed(s);
      renderTicker();
    });
  }
}

// ══ ITEM ACTIONS ══
function openItemModal(type, secId, itemId) {
  if (type === 'edit') {
    const item = sections.find(s=>s.id===secId)?.items.find(i=>i.id===itemId);
    if (!item) return;
    activeSec = secId;
    modal = { type:'edit', secId, itemId, data:{...item} };
  } else {
    modal = { type:'add', data:{name:'',type:'hybrid',thc:'',cbd:'',cbg:'',grower:'',price:'',size:'',desc:''} };
  }
  render();
}

function saveItem() {
  const d = { name:val('m-name'), type:val('m-type'), thc:val('m-thc'), cbd:val('m-cbd'), cbg:val('m-cbg'), grower:val('m-grower'), price:val('m-price'), size:val('m-size'), desc:val('m-desc') };
  if (!d.name) return;
  const sec = sections.find(s=>s.id===+val('m-sec'));
  if (!sec) return;
  if (modal.type==='add') { sec.items.push({id:nextId++,...d}); }
  else {
    const idx = sec.items.findIndex(i=>i.id===modal.itemId);
    if (idx>-1) sec.items[idx]={id:modal.itemId,...d}; else sec.items.push({id:nextId++,...d});
  }
  modal=null; save(); render();
}

// ══ RENDER ══
function render() {
  sortSections();

  // Pages
  const pagesEl = q('gt-pages');
  if (pagesEl) pagesEl.innerHTML = buildPages();

  // Modals
  q('item-modal')?.remove(); q('sheet-modal')?.remove(); q('ticker-edit-btn')?.remove();
  if (modal?.type==='add'||modal?.type==='edit') document.body.insertAdjacentHTML('beforeend', buildItemModal());
  else if (modal?.type==='sheet') document.body.insertAdjacentHTML('beforeend', buildSheetModal());

  // Edit bar
  const editBar = q('edit-bar');
  if (editBar) {
    editBar.classList.toggle('visible', mode==='edit');
    const bSheet = q('b-sheet');
    const bReload = q('b-reload');
    const status = q('edit-status');
    if (bSheet) bSheet.textContent = sheetUrl ? '⬡ Re-sync' : '⬡ Connect sheet';
    if (bReload) bReload.style.display = sheetUrl ? '' : 'none';
    if (status) status.textContent = sheetUrl ? '● Sheet connected' : '○ No sheet';
  }

  // Logo active
  q('logo-g')?.classList.toggle('active', mode==='view');
  q('logo-t')?.classList.toggle('active', mode==='edit');

  // Ticker edit button
  if (mode==='edit') {
    const teb = document.createElement('button');
    teb.className='ticker-edit-btn'; teb.id='ticker-edit-btn'; teb.innerHTML='🔥 Edit ticker';
    teb.addEventListener('click', openBannerEditor);
    document.body.appendChild(teb);
  }

  // Bind events and layout AFTER DOM is painted
  requestAnimationFrame(() => {
    updateLayout();
    goToPage(Math.min(curPage, totalPages()-1), false);
    updateNav();
    renderTicker();
    bindScrollHeader();
    bindEvents();
  });
}

// ══ SCROLL HEADER SHRINK ══
function bindScrollHeader() {
  document.querySelectorAll('.gt-page').forEach(page => {
    page.onscroll = () => {
      q('gt-header')?.classList.toggle('scrolled', page.scrollTop > 50);
      updateLayout();
    };
  });
}

// ══ BIND EVENTS ══
function bindEvents() {
  // Remove old delegated listener first
  document.removeEventListener('click', window._docClick);
  document.removeEventListener('keydown', window._docKey);

  // Delegated listener catches dynamically rendered buttons
  window._docClick = e => {
    const t = e.target.closest('button, input');
    if (!t) return;
    if (t.id === 'b-load') { const u = val('url-input'); if (u) { modal = null; fetchSheet(u); } }
    if (t.id === 'b-sheet-err') { modal = {type:'sheet'}; render(); }
  };
  window._docKey = e => {
    if (e.key === 'Enter' && e.target.id === 'url-input') {
      const u = val('url-input'); if (u) { modal = null; fetchSheet(u); }
    }
  };
  document.addEventListener('click', window._docClick);
  document.addEventListener('keydown', window._docKey);

  q('logo-g')?.addEventListener('click', () => setMode('view'));
  q('logo-t')?.addEventListener('click', () => setMode('edit'));
  q('b-add-item')?.addEventListener('click', () => { activeSec=sections[0]?.id; openItemModal('add'); });
  q('b-add-sec')?.addEventListener('click', () => { sections.push({id:nextId++,name:'New Section',items:[]}); save(); render(); });
  q('b-sheet')?.addEventListener('click', () => { modal={type:'sheet'}; render(); });
  q('b-reload')?.addEventListener('click', () => sheetUrl && fetchSheet(sheetUrl));
  // b-load, b-sheet-err, url-input handled by delegated listener above
  q('m-cancel')?.addEventListener('click', () => { modal=null; render(); });
  q('m-save')?.addEventListener('click', saveItem);
  q('arrow-prev')?.addEventListener('click', () => goToPage(curPage-1));
  q('arrow-next')?.addEventListener('click', () => goToPage(curPage+1));

  document.querySelectorAll('[data-action]').forEach(el => {
    const a = el.dataset.action;
    if (a==='rename') { el.addEventListener('input', () => { const s=sections.find(x=>x.id===+el.dataset.sec); if(s){s.name=el.value;save();} }); return; }
    el.addEventListener('click', e => {
      e.stopPropagation();
      const sid=+el.dataset.sec, iid=+el.dataset.item;
      if (a==='edit')      { activeSec=sid; openItemModal('edit',sid,iid); }
      if (a==='del')       { const s=sections.find(x=>x.id===sid); if(s){s.items=s.items.filter(i=>i.id!==iid);save();render();} }
      if (a==='delsec')    { sections=sections.filter(s=>s.id!==sid); save(); render(); }
      if (a==='addinline') { activeSec=sid; openItemModal('add'); }
    });
  });

  bindSwipe();
}

// ══ SWIPE (touch + mouse + trackpad) ══
function bindSwipe() {
  const wrap = q('gt-pages-wrap');
  if (!wrap || wrap._bound) return;
  wrap._bound = true;
  let sx=0, sy=0, dragging=false, horiz=null, moved=false;

  // Touch
  wrap.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; dragging=true; horiz=null; moved=false; }, {passive:true});
  wrap.addEventListener('touchmove',  e => {
    if (!dragging) return;
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if (horiz===null) horiz=Math.abs(dx)>Math.abs(dy);
    if (horiz) { e.preventDefault(); moved=true; }
  }, {passive:false});
  wrap.addEventListener('touchend', e => {
    if (!dragging||!horiz||!moved) { dragging=false; return; }
    const dx=e.changedTouches[0].clientX-sx; dragging=false;
    if (Math.abs(dx)>45) dx<0 ? goToPage(curPage+1) : goToPage(curPage-1);
  }, {passive:true});

  // Mouse drag
  wrap.addEventListener('mousedown', e => { sx=e.clientX; sy=e.clientY; dragging=true; horiz=null; moved=false; }, {passive:true});
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if (horiz===null && (Math.abs(dx)>5||Math.abs(dy)>5)) horiz=Math.abs(dx)>Math.abs(dy);
    if (horiz && Math.abs(dx)>5) moved=true;
  });
  window.addEventListener('mouseup', e => {
    if (!dragging) return;
    wrap.style.cursor = '';
    const dx = e.clientX - sx;
    dragging = false;
    if (horiz && moved && Math.abs(dx) > 60) dx < 0 ? goToPage(curPage+1) : goToPage(curPage-1);
  });

  // Trackpad horizontal scroll
  let wheelTimer=null;
  wrap.addEventListener('wheel', e => {
    if (Math.abs(e.deltaX)<Math.abs(e.deltaY)*0.8 || Math.abs(e.deltaX)<30) return;
    e.preventDefault();
    clearTimeout(wheelTimer);
    wheelTimer=setTimeout(() => { e.deltaX>0 ? goToPage(curPage+1) : goToPage(curPage-1); }, 60);
  }, {passive:false});
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded', () => {
  // Fix nextId if loading cached sections
  if (sections.length) {
    const maxId = sections.reduce((m,s) => Math.max(m, s.id, ...s.items.map(i=>i.id)), 0);
    if (maxId >= nextId) nextId = maxId + 1;
  }
  // Sort cached sections immediately
  sortSections();
  render();
  // Auto-fetch if URL saved but no cached sections
  if (sheetUrl && !sections.length) fetchSheet(sheetUrl);
});

// Recalculate layout on resize
window.addEventListener('resize', updateLayout, {passive:true});
</script>
</body>
